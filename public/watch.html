<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="socket-backend-url" content="">
  <meta name="api-backend-url" content="">
  <title>Launch Watch</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
    }
    body {
      position: relative;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }
    #backgroundCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    .star.small { width: 2px; height: 2px; }
    .star.medium { width: 3px; height: 3px; }
    .star.large { width: 4px; height: 4px; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .watch-main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 28px 16px 48px;
    }
    .watch-header {
      text-align: center;
      margin-bottom: 8px;
    }
    .watch-header h1 {
      margin: 0 0 10px 0;
      font-size: 1.6rem;
    }
    .watch-status {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }
    .watch-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f87171;
    }
    .watch-status-dot.connected { background: #4ade80; }
    .watch-platform-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .watch-platform-selector label {
      color: #888;
      font-size: 14px;
    }
    .watch-platform-selector select {
      background-color: #1e1e1e;
      color: #e0e0e0;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .watch-platform-selector select:hover { border-color: #666; }
    .watch-platform-selector select:focus { border-color: #4a9eff; }
    .back-home-nav {
      text-align: center;
      margin-bottom: 18px;
    }
    .back-home-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #6bb3ff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
    .back-home-link:hover {
      text-decoration: underline;
    }
    .back-home-link img {
      height: 36px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .watch-filters-panel {
      width: 100%;
      max-width: 520px;
      background-color: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 24px;
    }
    .watch-filters-panel h2 {
      margin: 0 0 12px 0;
      font-size: 1rem;
      color: #c8c8c8;
    }
    .watch-add-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .watch-add-row select {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      flex: 1 1 140px;
      min-width: 140px;
      cursor: pointer;
    }
    .watch-add-row input {
      flex: 2 1 160px;
      min-width: 120px;
      padding: 8px 10px;
      font-size: 13px;
      background: #141414;
      border: 2px solid #444;
      border-radius: 6px;
      color: #e8e8e8;
      box-sizing: border-box;
    }
    .watch-add-row input:focus {
      outline: none;
      border-color: #4a9eff;
    }
    .watch-add-btn {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
      color: #0a0a0a;
    }
    .watch-add-btn:hover { filter: brightness(1.06); }
    .watch-rules-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .watch-rules-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #141414;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid #333;
    }
    .watch-rule-meta { color: #888; flex-shrink: 0; }
    .watch-rule-val {
      color: #6bb3ff;
      word-break: break-all;
      text-align: right;
    }
    .watch-rule-remove {
      flex-shrink: 0;
      background: #3a3a3a;
      color: #e0e0e0;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    .watch-rule-remove:hover { background: #555; }
    .watch-cards-wrap {
      width: 100%;
      max-width: 960px;
    }
    .watch-cards-title {
      font-size: 14px;
      color: #888;
      margin-bottom: 12px;
    }
    .watch-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .watch-card {
      display: flex;
      gap: 10px;
      background: #1e1e1e;
      border: 2px solid #3d6b4a;
      border-radius: 10px;
      padding: 10px 10px 10px 12px;
      box-shadow: 0 0 16px rgba(74, 222, 128, 0.1);
      align-items: flex-start;
    }
    .watch-card-main {
      flex: 1;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      min-width: 0;
      cursor: pointer;
      border-radius: 8px;
    }
    .watch-card-main:hover {
      background: rgba(74, 222, 128, 0.06);
    }
    .watch-card-img {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #2a2a2a;
    }
    .watch-card-body { flex: 1; min-width: 0; }
    .watch-card-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: #f0f0f0;
      margin: 0 0 2px 0;
      line-height: 1.25;
    }
    .watch-card-symbol {
      font-size: 11px;
      color: #4ade80;
      margin-bottom: 6px;
    }
    .watch-card-mint {
      font-family: ui-monospace, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: #9ca3af;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .watch-card-mint:hover { color: #6bb3ff; }
    .watch-card-section {
      font-size: 11px;
      margin-top: 6px;
    }
    .watch-card-label {
      color: #888;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .watch-card-links a {
      color: #4a9eff;
      text-decoration: none;
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 4px;
    }
    .watch-card-links a:hover { color: #6bb3ff; }
    .watch-card-match {
      font-size: 10px;
      color: #fbbf24;
      margin-top: 6px;
      line-height: 1.35;
    }
    .watch-card-remove {
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #3a3a3a;
      color: #e0e0e0;
    }
    .watch-card-remove:hover {
      background: #555;
    }
    .watch-empty {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 24px;
      border: 1px dashed #444;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <canvas id="backgroundCanvas"></canvas>
  <div class="stars-container" id="starsContainer" aria-hidden="true"></div>

  <div class="watch-status" id="watchStatus" aria-live="polite">
    <span class="watch-status-dot" id="watchStatusDot"></span>
    <span id="watchStatusText">Disconnected</span>
  </div>

  <div class="watch-main">
    <div class="watch-header">
      <h1>Launch Watch</h1>
      <div class="watch-platform-selector">
        <label for="platformSelect">Trading platform:</label>
        <select id="platformSelect" aria-label="Trading platform for card clicks">
          <option value="axiom">Axiom</option>
          <option value="gmgn">GMGN</option>
          <option value="terminal">Terminal</option>
        </select>
      </div>
      <div class="back-home-nav">
        <a href="index.html" class="back-home-link">
          <img src="foxdown.png" alt="" width="72" height="72" decoding="async" />
          <span>Back Home</span>
        </a>
      </div>
    </div>

    <div class="watch-filters-panel">
      <h2>Alert rules</h2>
      <div class="watch-add-row">
        <select id="ruleType" aria-label="Rule type">
          <option value="deployer">Deployer wallet</option>
          <option value="twitter">X / Twitter username</option>
          <option value="tickerExact">Ticker exactly</option>
          <option value="tickerStarts">Ticker starts with</option>
          <option value="tickerEnds">Ticker ends with</option>
          <option value="tickerContains">Ticker contains</option>
          <option value="nameExact">Name exactly</option>
          <option value="nameStarts">Name starts with</option>
          <option value="nameEnds">Name ends with</option>
          <option value="nameContains">Name contains</option>
        </select>
        <input type="text" id="ruleValue" placeholder="Value…" autocomplete="off" spellcheck="false" />
        <button type="button" class="watch-add-btn" id="ruleAddBtn">Add rule</button>
      </div>
      <ul class="watch-rules-list" id="ruleList"></ul>
    </div>

    <div class="watch-cards-wrap">
      <div class="watch-cards-title">Matches</div>
      <div class="watch-cards" id="watchCards">
        <div class="watch-empty" id="watchEmpty">No matches yet. Connect and add rules above.</div>
      </div>
    </div>
  </div>

  <script>
    const LS_RULES = 'watch.alert.rules.v1';
    const LS_PLATFORM = 'watch.trading.platform.v1';
    const MAX_CARDS = 60;
    const PUMP_DELAY_MS = 1000;

    const RULE_LABELS = {
      deployer: 'Deployer wallet',
      twitter: 'X / Twitter username',
      tickerExact: 'Ticker exactly',
      tickerStarts: 'Ticker starts with',
      tickerEnds: 'Ticker ends with',
      tickerContains: 'Ticker contains',
      nameExact: 'Name exactly',
      nameStarts: 'Name starts with',
      nameEnds: 'Name ends with',
      nameContains: 'Name contains',
    };

    let socket = null;
    let rules = [];
    const alertedMints = new Set();

    function initStars() {
      const el = document.getElementById('starsContainer');
      if (!el) return;
      const sizes = ['small', 'medium', 'large'];
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star ' + sizes[Math.floor(Math.random() * 3)];
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        el.appendChild(s);
      }
    }

    class HomeCanvasAnimation {
      constructor() {
        this.canvas = document.getElementById('backgroundCanvas');
        if (!this.canvas) return;
        this.ctx = this.canvas.getContext('2d');
        this.bars = [];
        this.setupCanvas();
        this.createBars();
        this.animate();
      }
      setupCanvas() {
        const resize = () => {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
          this.createBars();
        };
        resize();
        window.addEventListener('resize', resize);
      }
      createBars() {
        const width = this.canvas.width;
        const height = this.canvas.height;
        const barCount = Math.floor(width / 20);
        this.bars = [];
        for (let i = 0; i < barCount; i++) {
          this.bars.push({
            x: i * (width / barCount),
            height: Math.random() * height * 0.25,
            targetHeight: Math.random() * height * 0.25,
            speed: 0.005 + Math.random() * 0.01,
            phase: Math.random() * Math.PI * 2,
            waveSpeed: 0.15 + Math.random() * 0.15,
          });
        }
      }
      animate() {
        if (!this.canvas) return;
        const ctx = this.ctx;
        const width = this.canvas.width;
        const height = this.canvas.height;
        const time = Date.now() * 0.001;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, width, height);
        const barWidth = width / this.bars.length;
        this.bars.forEach((bar, i) => {
          bar.targetHeight =
            height * 0.1 +
            Math.sin(time * bar.waveSpeed + bar.phase) * (height * 0.15) +
            Math.sin(time * bar.waveSpeed * 0.7 + i * 0.1) * (height * 0.05);
          bar.height += (bar.targetHeight - bar.height) * bar.speed;
          const barHeight = Math.max(1, bar.height);
          const barX = bar.x;
          const barY = height - barHeight;
          const gradient = ctx.createLinearGradient(barX, barY, barX, height);
          gradient.addColorStop(0, 'rgba(74, 222, 128, 0.15)');
          gradient.addColorStop(0.5, 'rgba(74, 222, 128, 0.08)');
          gradient.addColorStop(1, 'rgba(74, 222, 128, 0.03)');
          ctx.fillStyle = gradient;
          ctx.fillRect(barX, barY, barWidth - 2, barHeight);
        });
        requestAnimationFrame(() => this.animate());
      }
    }

    function getTradingPlatformUrl(mint) {
      const sel = document.getElementById('platformSelect');
      const platform = sel?.value || 'axiom';
      switch (platform) {
        case 'gmgn':
          return 'https://gmgn.ai/sol/token/' + encodeURIComponent(mint);
        case 'terminal':
          return 'https://trade.padre.gg/trade/solana/' + encodeURIComponent(mint);
        case 'axiom':
        default:
          return 'https://axiom.trade/t/' + encodeURIComponent(mint) + '?chain=sol';
      }
    }

    function apiOrigin() {
      const m = document.querySelector('meta[name="api-backend-url"]');
      const u = m?.getAttribute('content')?.trim();
      if (u) return u.replace(/\/$/, '');
      const s = document.querySelector('meta[name="socket-backend-url"]');
      const su = s?.getAttribute('content')?.trim();
      if (su) return su.replace(/\/$/, '');
      return window.location.origin;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function normalizeTwitterInput(v) {
      return String(v || '')
        .trim()
        .replace(/^@+/, '')
        .toLowerCase();
    }

    function extractTwitterHandle(url) {
      if (!url || typeof url !== 'string') return null;
      try {
        const u = new URL(url.trim());
        const host = u.hostname.replace(/^www\./i, '').toLowerCase();
        if (host !== 'x.com' && host !== 'twitter.com' && host !== 'mobile.x.com' && host !== 'mobile.twitter.com')
          return null;
        const parts = u.pathname.split('/').filter(Boolean);
        if (parts.length === 0) return null;
        if (parts[0] === 'i' || parts[0] === 'intent' || parts[0] === 'share') return null;
        return parts[0].replace(/^@/, '').toLowerCase() || null;
      } catch {
        return null;
      }
    }

    function loadRules() {
      try {
        const raw = localStorage.getItem(LS_RULES);
        if (!raw) return [];
        const p = JSON.parse(raw);
        return Array.isArray(p) ? p : [];
      } catch {
        return [];
      }
    }

    function saveRules() {
      localStorage.setItem(LS_RULES, JSON.stringify(rules));
    }

    function renderRuleList() {
      const ul = document.getElementById('ruleList');
      if (!ul) return;
      ul.innerHTML = '';
      rules.forEach((r, idx) => {
        const li = document.createElement('li');
        li.innerHTML =
          '<span class="watch-rule-meta">' +
          escapeHtml(RULE_LABELS[r.type] || r.type) +
          '</span>' +
          '<span class="watch-rule-val">' +
          escapeHtml(r.value) +
          '</span>' +
          '<button type="button" class="watch-rule-remove" data-i="' +
          idx +
          '">Remove</button>';
        ul.appendChild(li);
      });
      ul.querySelectorAll('.watch-rule-remove').forEach((btn) => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.getAttribute('data-i'), 10);
          if (!Number.isNaN(i)) {
            rules.splice(i, 1);
            saveRules();
            renderRuleList();
          }
        });
      });
    }

    function ruleMatches(rule, t) {
      const v = (rule.value || '').trim();
      if (!v) return false;
      const sym = String(t.symbol || '').trim();
      const name = String(t.name || '').trim();
      const deployer = String(t.deployer || t.creator || '').trim();

      switch (rule.type) {
        case 'deployer':
          return deployer === v;
        case 'twitter': {
          const want = normalizeTwitterInput(v);
          if (!want) return false;
          const h = extractTwitterHandle(t.twitter);
          return h === want;
        }
        case 'tickerExact':
          return sym.toLowerCase() === v.toLowerCase();
        case 'tickerStarts':
          return sym.toLowerCase().startsWith(v.toLowerCase());
        case 'tickerEnds':
          return sym.toLowerCase().endsWith(v.toLowerCase());
        case 'tickerContains':
          return sym.toLowerCase().includes(v.toLowerCase());
        case 'nameExact':
          return name.toLowerCase() === v.toLowerCase();
        case 'nameStarts':
          return name.toLowerCase().startsWith(v.toLowerCase());
        case 'nameEnds':
          return name.toLowerCase().endsWith(v.toLowerCase());
        case 'nameContains':
          return name.toLowerCase().includes(v.toLowerCase());
        default:
          return false;
      }
    }

    function evaluateRules(t) {
      if (!rules.length) return null;
      for (const r of rules) {
        if (ruleMatches(r, t)) return r;
      }
      return null;
    }

    async function fetchPumpCoin(mint) {
      const base = apiOrigin();
      const url = base + '/api/pump-coin/' + encodeURIComponent(mint);
      const res = await fetch(url);
      if (!res.ok) return null;
      return res.json();
    }

    function mergeToken(socketPayload, api) {
      const out = { ...socketPayload };
      if (!api) return out;
      out.name = api.name ?? out.name;
      out.symbol = api.symbol ?? out.symbol;
      out.deployer = out.deployer || api.creator || null;
      out.creator = api.creator ?? out.creator ?? out.deployer;
      out.twitter = api.twitter ?? out.twitter;
      out.website = api.website ?? out.website;
      out.telegram = api.telegram ?? out.telegram;
      out.description = api.description ?? out.description;
      out.image_uri = api.image_uri ?? out.image;
      out.image = out.image_uri || out.image;
      return out;
    }

    function playMatchSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        osc1.type = 'sine';
        osc2.type = 'sine';
        osc1.frequency.setValueAtTime(523, ctx.currentTime);
        osc2.frequency.setValueAtTime(659, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);
        osc1.start();
        osc2.start();
        osc1.stop(ctx.currentTime + 0.45);
        osc2.stop(ctx.currentTime + 0.45);
      } catch (e) {
        console.warn('Sound:', e);
      }
    }

    function updateEmptyState() {
      const container = document.getElementById('watchCards');
      const empty = document.getElementById('watchEmpty');
      if (!container || !empty) return;
      const hasCards = container.querySelectorAll('.watch-card').length > 0;
      empty.style.display = hasCards ? 'none' : 'block';
    }

    function addMatchCard(t, matchedRule) {
      const container = document.getElementById('watchCards');
      if (!container) return;
      const empty = document.getElementById('watchEmpty');
      if (empty) empty.style.display = 'none';

      const mint = t.mint || '';
      const imgUrl = t.image_uri || t.image || '';
      const pumpUrl = 'https://pump.fun/coin/' + encodeURIComponent(mint);

      const links = [];
      if (t.twitter) links.push('<a href="' + escapeHtml(t.twitter) + '" target="_blank" rel="noopener">X / Twitter</a>');
      if (t.website) links.push('<a href="' + escapeHtml(t.website) + '" target="_blank" rel="noopener">Website</a>');
      if (t.telegram) links.push('<a href="' + escapeHtml(t.telegram) + '" target="_blank" rel="noopener">Telegram</a>');
      links.push('<a href="' + escapeHtml(pumpUrl) + '" target="_blank" rel="noopener">Pump.fun</a>');

      const abbrev = mint.length > 12 ? mint.slice(0, 4) + '…' + mint.slice(-4) : mint;
      const ruleLabel = RULE_LABELS[matchedRule.type] || matchedRule.type;

      const card = document.createElement('div');
      card.className = 'watch-card';
      card.dataset.mint = mint;
      card.innerHTML =
        '<div class="watch-card-main" role="button" tabindex="0" title="Open token on selected platform">' +
        (imgUrl
          ? '<img class="watch-card-img" src="' + escapeHtml(imgUrl) + '" alt="" loading="lazy" />'
          : '<div class="watch-card-img"></div>') +
        '<div class="watch-card-body">' +
        '<div class="watch-card-name">' +
        escapeHtml(t.name || 'Unknown') +
        '</div>' +
        '<div class="watch-card-symbol">' +
        escapeHtml(t.symbol || '') +
        '</div>' +
        '<div class="watch-card-mint" title="Click to copy mint (does not open chart)" data-mint="' +
        escapeHtml(mint) +
        '">' +
        escapeHtml(abbrev) +
        '</div>' +
        (links.length
          ? '<div class="watch-card-section"><div class="watch-card-label">Links</div><div class="watch-card-links">' +
            links.join('') +
            '</div></div>'
          : '') +
        '<div class="watch-card-match">Matched: ' +
        escapeHtml(ruleLabel) +
        ' — ' +
        escapeHtml(matchedRule.value) +
        '</div>' +
        '</div></div>' +
        '<button type="button" class="watch-card-remove" title="Remove from list">Remove</button>';

      const main = card.querySelector('.watch-card-main');
      const openChart = () => {
        window.open(getTradingPlatformUrl(mint), '_blank', 'noopener,noreferrer');
      };
      if (main) {
        main.addEventListener('click', openChart);
        main.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openChart();
          }
        });
      }

      const mintEl = card.querySelector('.watch-card-mint');
      if (mintEl) {
        mintEl.addEventListener('click', (e) => {
          e.stopPropagation();
          navigator.clipboard.writeText(mint).catch(() => {});
        });
      }

      card.querySelectorAll('.watch-card-links a').forEach((a) => {
        a.addEventListener('click', (e) => e.stopPropagation());
      });

      card.querySelector('.watch-card-remove')?.addEventListener('click', (e) => {
        e.stopPropagation();
        alertedMints.delete(mint);
        card.remove();
        updateEmptyState();
      });

      container.insertBefore(card, container.firstChild);
      while (container.querySelectorAll('.watch-card').length > MAX_CARDS) {
        const last = container.querySelector('.watch-card:last-of-type');
        if (last) last.remove();
      }
      updateEmptyState();
    }

    async function handleNewToken(tokenData) {
      const mint = tokenData.mint;
      if (!mint) return;

      await new Promise((r) => setTimeout(r, PUMP_DELAY_MS));

      let api = null;
      try {
        api = await fetchPumpCoin(mint);
      } catch (e) {
        console.warn('[Watch] Pump fetch failed', mint, e);
      }

      const t = mergeToken({ ...tokenData }, api);
      if (!rules.length) return;

      const hit = evaluateRules(t);
      if (!hit) return;
      if (alertedMints.has(mint)) return;
      alertedMints.add(mint);

      playMatchSound();
      addMatchCard(t, hit);
    }

    function setConnected(ok) {
      const dot = document.getElementById('watchStatusDot');
      const tx = document.getElementById('watchStatusText');
      if (dot) dot.classList.toggle('connected', ok);
      if (tx) tx.textContent = ok ? 'Connected to server' : 'Disconnected';
    }

    function connectSocket() {
      const meta = document.querySelector('meta[name="socket-backend-url"]');
      const backend = meta?.getAttribute('content')?.trim() || '';
      const socketUrl = backend || window.location.origin;
      const opts = { transports: ['websocket', 'polling'] };
      socket = io(socketUrl, opts);

      socket.on('connect', () => setConnected(true));
      socket.on('disconnect', () => setConnected(false));
      socket.on('connect_error', () => setConnected(false));

      socket.on('token:new', (tokenData) => {
        handleNewToken(tokenData).catch((e) => console.error('[Watch]', e));
      });
    }

    function initUi() {
      rules = loadRules();
      renderRuleList();

      const platSel = document.getElementById('platformSelect');
      if (platSel) {
        try {
          const saved = localStorage.getItem(LS_PLATFORM);
          if (saved && ['axiom', 'gmgn', 'terminal'].includes(saved)) platSel.value = saved;
        } catch {
          /* ignore */
        }
        platSel.addEventListener('change', () => {
          try {
            localStorage.setItem(LS_PLATFORM, platSel.value);
          } catch {
            /* ignore */
          }
        });
      }

      document.getElementById('ruleAddBtn')?.addEventListener('click', () => {
        const type = document.getElementById('ruleType').value;
        const value = document.getElementById('ruleValue').value.trim();
        if (!value) return;
        rules.push({ type, value });
        saveRules();
        document.getElementById('ruleValue').value = '';
        renderRuleList();
      });

      connectSocket();
    }

    initStars();
    new HomeCanvasAnimation();

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initUi);
    } else {
      initUi();
    }
  </script>
</body>
</html>
