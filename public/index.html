

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dex Payment Monitor</title>
  <style>
    /* —— Background layers —— */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      position: relative;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
    }

    #backgroundCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    .star.small { width: 2px; height: 2px; }
    .star.medium { width: 3px; height: 3px; }
    .star.large { width: 4px; height: 4px; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .dexmon-main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      box-sizing: border-box;
      padding-top: 40px;
      overflow: hidden;
    }

    h1 { margin-bottom: 10px; }
    .platform-selector {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .platform-selector label {
      color: #888;
      font-size: 14px;
    }
    .platform-selector select {
      background-color: #1e1e1e;
      color: #e0e0e0;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .platform-selector select:hover {
      border-color: #666;
    }
    .platform-selector select:focus {
      border-color: #4a9eff;
    }
    .grid { display: flex; gap: 20px; }
    .box {
      width: 200px;
      height: 200px;
      background-color: #1e1e1e;
      border: 4px solid #444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .box-stack {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      overflow: hidden;
    }
    .box-token-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* DexScreener 3:1 header banner, centered vertically over the token image */
    .box-dex-banner {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      aspect-ratio: 3 / 1;
      object-fit: cover;
      z-index: 1;
      display: none;
      pointer-events: none;
    }
    .box.has-dex-banner .box-dex-banner {
      display: block;
    }
    .box-placeholder {
      color: #666;
      font-size: 14px;
      text-align: center;
      padding: 12px;
      line-height: 1.35;
      user-select: none;
      pointer-events: none;
    }
    .remove-btn {
      display: none;
      margin-top: 20px; /* moved further down */
      background-color: #3a3a3a;
      color: #e0e0e0;
      border: none;
      border-radius: 6px;
      padding: 10px 16px; /* bigger button */
      font-size: 15px;   /* larger text */
      cursor: pointer;
    }
    .remove-btn:hover { background-color: #575757; }
    .box-container { display: flex; flex-direction: column; align-items: center; }
    .token-info {
      margin-top: 10px;
      padding: 10px;
      background-color: #1a1a1a;
      border-radius: 6px;
      width: 200px;
      font-size: 12px;
      display: none;
    }
    .token-info.visible { display: block; }
    .info-section { margin-bottom: 8px; }
    .info-label {
      color: #888;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .info-link {
      color: #4a9eff;
      text-decoration: none;
      display: block;
      margin: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .info-link:hover { color: #6bb3ff; }
    .boost-count {
      color: #ffa500;
      font-weight: bold;
    }
    .dexmon-hint {
      margin-top: auto;
      padding: 16px 20px 0;
      font-size: 13px;
      color: #888;
      text-align: center;
      max-width: 28rem;
      line-height: 1.45;
    }
    .dexmon-support {
      margin-top: 12px;
      padding: 0 20px 24px;
      font-size: 13px;
      color: #888;
      text-align: center;
      max-width: 28rem;
      line-height: 1.45;
    }
    .dexmon-support-ca {
      margin-top: 8px;
      display: inline-block;
      background: none;
      border: none;
      padding: 4px 8px;
      font: inherit;
      font-family: ui-monospace, Menlo, Monaco, Consolas, monospace;
      color: #6bb3ff;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .dexmon-support-ca:hover {
      color: #8cc8ff;
    }
    .dexmon-support-ca:focus-visible {
      outline: 2px solid #4a9eff;
      outline-offset: 2px;
    }

    .ca-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .ca-modal-overlay.open {
      display: flex;
    }
    .ca-modal {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: linear-gradient(160deg, #282828 0%, #181818 100%);
      border: 2px solid #3d3d3d;
      border-radius: 16px;
      box-shadow:
        0 24px 56px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(74, 222, 128, 0.12);
      overflow: visible;
    }
    .ca-modal-inner {
      position: relative;
      padding: 1.6rem 1.6rem 1.25rem;
      padding-bottom: 4.75rem;
      min-height: 140px;
    }
    .ca-modal-fox {
      position: absolute;
      left: 0.35rem;
      bottom: 0.35rem;
      width: min(132px, 36vw);
      height: auto;
      pointer-events: none;
      z-index: 0;
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.45));
    }
    .ca-modal-body {
      position: relative;
      z-index: 1;
    }
    .ca-modal-body h2 {
      margin: 0 0 0.35rem 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -0.02em;
    }
    .ca-modal-hint {
      margin: 0 0 1rem 0;
      font-size: 0.85rem;
      color: #888;
      line-height: 1.4;
    }
    .ca-modal-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      font-size: 14px;
      font-family: ui-monospace, Menlo, Monaco, Consolas, monospace;
      color: #e8e8e8;
      background: #141414;
      border: 2px solid #4a4a4a;
      border-radius: 10px;
      outline: none;
      margin-bottom: 8px;
    }
    .ca-modal-input::placeholder {
      color: #555;
    }
    .ca-modal-input:focus {
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.2);
    }
    .ca-modal-error {
      font-size: 0.8rem;
      color: #f87171;
      margin-bottom: 10px;
      min-height: 1.2em;
    }
    .ca-modal-error:empty {
      display: none;
    }
    .ca-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }
    .ca-modal-actions button {
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-weight: 600;
    }
    .ca-modal-cancel {
      background: #333;
      color: #ccc;
    }
    .ca-modal-cancel:hover {
      background: #444;
    }
    .ca-modal-submit {
      background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
      color: #0a0a0a;
    }
    .ca-modal-submit:hover {
      filter: brightness(1.08);
    }
  </style>
</head>
<body>
  <canvas id="backgroundCanvas"></canvas>
  <div class="stars-container" id="starsContainer" aria-hidden="true"></div>

  <div class="dexmon-main">
  <h1>Dex Payment Monitor</h1>
  <div class="platform-selector">
    <label for="platformSelect">Trading Platform:</label>
    <select id="platformSelect">
      <option value="axiom">Axiom</option>
      <option value="gmgn">GMGN</option>
      <option value="terminal">Terminal</option>
    </select>
  </div>
  <div class="grid">
    <div class="box-container">
      <div class="box" onclick="handleBoxClick(this)"><span class="box-placeholder">Click to add CA</span></div>
      <div class="token-info"></div>
      <button class="remove-btn" onclick="removeToken(this)">Remove</button>
    </div>
    <div class="box-container">
      <div class="box" onclick="handleBoxClick(this)"><span class="box-placeholder">Click to add CA</span></div>
      <div class="token-info"></div>
      <button class="remove-btn" onclick="removeToken(this)">Remove</button>
    </div>
    <div class="box-container">
      <div class="box" onclick="handleBoxClick(this)"><span class="box-placeholder">Click to add CA</span></div>
      <div class="token-info"></div>
      <button class="remove-btn" onclick="removeToken(this)">Remove</button>
    </div>
  </div>
  <p class="dexmon-hint">Keep this tab in a separate window to prevent delayed alerts.</p>
  <p class="dexmon-support">
    Support this tool and future projects:<br>
    <button type="button" class="dexmon-support-ca" id="supportTipCa" title="Click to copy contract address">
      <span id="supportTipCaInner">[xxxx...pump]</span>
    </button>
  </p>
  </div>

  <div id="caModalOverlay" class="ca-modal-overlay" aria-hidden="true">
    <div class="ca-modal" role="dialog" aria-modal="true" aria-labelledby="caModalTitle" tabindex="-1">
      <div class="ca-modal-inner">
        <img src="foxup.png" alt="" class="ca-modal-fox" width="132" decoding="async" />
        <div class="ca-modal-body">
          <h2 id="caModalTitle">Add token</h2>
          <p class="ca-modal-hint">Paste the Solana mint (contract address) to monitor.</p>
          <input type="text" id="caModalInput" class="ca-modal-input" placeholder="Mint address…" autocomplete="off" spellcheck="false" />
          <p id="caModalError" class="ca-modal-error" role="alert"></p>
          <div class="ca-modal-actions">
            <button type="button" class="ca-modal-cancel" id="caModalCancel">Cancel</button>
            <button type="button" class="ca-modal-submit" id="caModalSubmit">Add token</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function initStars() {
      const el = document.getElementById('starsContainer');
      if (!el) return;
      const sizes = ['small', 'medium', 'large'];
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star ' + sizes[Math.floor(Math.random() * 3)];
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        el.appendChild(s);
      }
    }

    class HomeCanvasAnimation {
      constructor() {
        this.canvas = document.getElementById('backgroundCanvas');
        if (!this.canvas) return;
        this.ctx = this.canvas.getContext('2d');
        this.bars = [];
        this.setupCanvas();
        this.createBars();
        this.animate();
      }

      setupCanvas() {
        const resize = () => {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
          this.createBars();
        };
        resize();
        window.addEventListener('resize', resize);
      }

      createBars() {
        const width = this.canvas.width;
        const height = this.canvas.height;
        const barCount = Math.floor(width / 20);
        const barWidth = width / barCount;
        this.bars = [];
        for (let i = 0; i < barCount; i++) {
          this.bars.push({
            x: i * barWidth,
            height: Math.random() * height * 0.25,
            targetHeight: Math.random() * height * 0.25,
            speed: 0.005 + Math.random() * 0.01,
            phase: Math.random() * Math.PI * 2,
            waveSpeed: 0.15 + Math.random() * 0.15
          });
        }
      }

      animate() {
        if (!this.canvas) return;
        const ctx = this.ctx;
        const width = this.canvas.width;
        const height = this.canvas.height;
        const time = Date.now() * 0.001;

        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, width, height);

        this.bars.forEach((bar, i) => {
          bar.targetHeight =
            height * 0.1 +
            Math.sin(time * bar.waveSpeed + bar.phase) * (height * 0.15) +
            Math.sin(time * bar.waveSpeed * 0.7 + i * 0.1) * (height * 0.05);
          bar.height += (bar.targetHeight - bar.height) * bar.speed;

          const barWidth = width / this.bars.length;
          const barHeight = Math.max(1, bar.height);
          const barX = bar.x;
          const barY = height - barHeight;

          const gradient = ctx.createLinearGradient(barX, barY, barX, height);
          gradient.addColorStop(0, 'rgba(74, 222, 128, 0.15)');
          gradient.addColorStop(0.5, 'rgba(74, 222, 128, 0.08)');
          gradient.addColorStop(1, 'rgba(74, 222, 128, 0.03)');
          ctx.fillStyle = gradient;
          ctx.fillRect(barX, barY, barWidth - 2, barHeight);

          if (barHeight > 10) {
            const glowGradient = ctx.createLinearGradient(barX, barY, barX, barY + 15);
            glowGradient.addColorStop(0, 'rgba(74, 222, 128, 0.08)');
            glowGradient.addColorStop(1, 'rgba(74, 222, 128, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(barX, barY, barWidth - 2, Math.min(15, barHeight));
          }
        });

        requestAnimationFrame(() => this.animate());
      }
    }

    function startDexmonBackground() {
      initStars();
      new HomeCanvasAnimation();
    }

    /** Paste full SPL mint when the support token is live; leave '' to keep the xxxx...pump placeholder (click shows Coming soon). */
    const SUPPORT_TIP_MINT = '';

    function abbreviateSupportMint(mint) {
      if (!mint || mint.length < 9) return mint || '';
      return `${mint.slice(0, 4)}...${mint.slice(-4)}`;
    }

    function initSupportTipCa() {
      const btn = document.getElementById('supportTipCa');
      const inner = document.getElementById('supportTipCaInner');
      if (!btn || !inner) return;
      const displayText = SUPPORT_TIP_MINT
        ? `[${abbreviateSupportMint(SUPPORT_TIP_MINT)}]`
        : '[xxxx...pump]';
      inner.textContent = displayText;
      btn.title = SUPPORT_TIP_MINT
        ? 'Click to copy contract address'
        : 'CA coming soon';

      btn.addEventListener('click', async () => {
        if (!SUPPORT_TIP_MINT) {
          const prev = inner.textContent;
          inner.textContent = '[Coming soon]';
          setTimeout(() => {
            inner.textContent = prev;
          }, 1200);
          return;
        }
        try {
          await navigator.clipboard.writeText(SUPPORT_TIP_MINT.trim());
          const prev = inner.textContent;
          inner.textContent = '[Copied!]';
          setTimeout(() => {
            inner.textContent = prev;
          }, 1500);
        } catch (e) {
          console.error('Copy failed:', e);
        }
      });
    }

    let caModalTargetBox = null;

    function openCaModal(box) {
      caModalTargetBox = box;
      const overlay = document.getElementById('caModalOverlay');
      const input = document.getElementById('caModalInput');
      const err = document.getElementById('caModalError');
      if (!overlay || !input) return;
      err.textContent = '';
      input.value = '';
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => {
        input.focus();
        input.select();
      });
    }

    function closeCaModal() {
      const overlay = document.getElementById('caModalOverlay');
      if (!overlay) return;
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      caModalTargetBox = null;
    }

    function confirmCaModal() {
      const box = caModalTargetBox;
      const input = document.getElementById('caModalInput');
      const err = document.getElementById('caModalError');
      if (!box || !input || !err) return;
      const trimmed = input.value.trim();
      if (!trimmed) {
        err.textContent = 'Enter a contract address.';
        return;
      }
      err.textContent = '';
      commitAddToken(box, trimmed);
      closeCaModal();
    }

    function initCaModal() {
      const overlay = document.getElementById('caModalOverlay');
      const input = document.getElementById('caModalInput');
      const cancel = document.getElementById('caModalCancel');
      const submit = document.getElementById('caModalSubmit');
      if (!overlay || !input || !cancel || !submit) return;

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeCaModal();
      });
      cancel.addEventListener('click', closeCaModal);
      submit.addEventListener('click', confirmCaModal);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          confirmCaModal();
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) {
          e.preventDefault();
          closeCaModal();
        }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        startDexmonBackground();
        initSupportTipCa();
        initCaModal();
      });
    } else {
      startDexmonBackground();
      initSupportTipCa();
      initCaModal();
    }

    const tokens = []; // store {address, box, lastStatus, infoDiv, profileData, lastBoostCount, lastSocialCount}

    function setBoxPlaceholder(box) {
      box.innerHTML = '<span class="box-placeholder">Click to add CA</span>';
      box.classList.remove('has-dex-banner');
    }

    async function getDex(mint) {
      try {
        const response = await fetch(`https://api.dexscreener.com/tokens/v1/solana/${mint}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        
        if (!data || data.length === 0) {
          return {
            websites: [],
            socials: [],
            activeBoosts: 0,
            headerUrl: null
          };
        }
        
        const pair = data[0];
        const headerRaw = pair.info?.header;
        const headerUrl =
          typeof headerRaw === 'string' && headerRaw.trim() !== '' ? headerRaw.trim() : null;
        
        return {
          websites: pair.info?.websites || [],
          socials: pair.info?.socials || [],
          activeBoosts: pair.boosts?.active || 0,
          headerUrl
        };
      } catch (error) {
        console.error('getDex failed:', error);
        return {
          websites: [],
          socials: [],
          activeBoosts: 0,
          headerUrl: null
        };
      }
    }

    function setDexBanner(token, url) {
      const banner = token.box.querySelector('.box-dex-banner');
      if (!banner) return;
      banner.onload = null;
      banner.onerror = null;
      if (!url) {
        token.box.classList.remove('has-dex-banner');
        banner.removeAttribute('src');
        return;
      }
      if (banner.getAttribute('src') === url && banner.complete && banner.naturalWidth > 0) {
        token.box.classList.add('has-dex-banner');
        return;
      }
      token.box.classList.remove('has-dex-banner');
      banner.onload = () => token.box.classList.add('has-dex-banner');
      banner.onerror = () => {
        token.box.classList.remove('has-dex-banner');
        banner.removeAttribute('src');
      };
      banner.src = url;
    }

    function dexSocialLinkLabel(social) {
      const rawUrl = social.url || '';
      const typeLower = (social.type || '').toLowerCase();
      let pathname = '';
      let host = '';
      try {
        const u = new URL(rawUrl);
        host = u.hostname.replace(/^www\./i, '').toLowerCase();
        pathname = u.pathname;
      } catch {
        return social.type || 'Social';
      }
      const isXOrTwitter =
        host === 'x.com' ||
        host === 'twitter.com' ||
        host === 'mobile.x.com' ||
        host === 'mobile.twitter.com' ||
        typeLower === 'twitter' ||
        typeLower === 'x';
      if (isXOrTwitter) {
        if (pathname.includes('/i/')) return 'X Community';
        if (pathname.includes('/status/')) return 'Tweet Link';
        return 'X Profile';
      }
      return social.type || 'Social';
    }

    function updateTokenInfo(token) {
      if (!token.profileData) {
        token.infoDiv.style.display = 'none';
        return;
      }

      let html = '';
      
      if (token.profileData.activeBoosts > 0) {
        html += `<div class="info-section">
          <div class="info-label">Boosts</div>
          <span class="boost-count">${token.profileData.activeBoosts} active</span>
        </div>`;
      }

      if (token.profileData.websites.length > 0) {
        html += `<div class="info-section"><div class="info-label">Websites</div>`;
        token.profileData.websites.forEach(site => {
          html += `<a href="${site.url}" target="_blank" class="info-link">${site.label || 'Website'}</a>`;
        });
        html += `</div>`;
      }

      if (token.profileData.socials.length > 0) {
        html += `<div class="info-section"><div class="info-label">Socials</div>`;
        token.profileData.socials.forEach(social => {
          const label = dexSocialLinkLabel(social);
          html += `<a href="${social.url}" target="_blank" class="info-link">${label}</a>`;
        });
        html += `</div>`;
      }

      if (html) {
        token.infoDiv.innerHTML = html;
        token.infoDiv.classList.add('visible');
      } else {
        token.infoDiv.style.display = 'none';
      }
    }

    function handleBoxClick(box) {
      // If empty, add token
      if (box.querySelector('.box-placeholder')) {
        addToken(box);
      } else {
        // If populated, open new tab with selected platform link
        const token = tokens.find(t => t.box === box);
        if (token) {
          const platform = document.getElementById('platformSelect').value;
          let url;
          
          switch(platform) {
            case 'gmgn':
              url = `https://gmgn.ai/sol/token/${token.address}`;
              break;
            case 'terminal':
              url = `https://trade.padre.gg/trade/solana/${token.address}`;
              break;
            case 'axiom':
            default:
              url = `https://axiom.trade/t/${token.address}?chain=sol`;
              break;
          }
          
          window.open(url, "_blank");
        }
      }
    }

    function addToken(box) {
      openCaModal(box);
    }

    function commitAddToken(box, trimmed) {
      box.innerHTML = "";
      const stack = document.createElement("div");
      stack.className = "box-stack";
      const img = document.createElement("img");
      img.className = "box-token-img";
      img.src = `https://images.pump.fun/coin-image/${trimmed}?variant=600x600`;
      img.alt = "Token Image";
      const banner = document.createElement("img");
      banner.className = "box-dex-banner";
      banner.alt = "";
      stack.appendChild(img);
      stack.appendChild(banner);
      box.appendChild(stack);

      const removeBtn = box.parentElement.querySelector(".remove-btn");
      removeBtn.style.display = "inline-block";

      const infoDiv = box.parentElement.querySelector(".token-info");
      tokens.push({ 
        address: trimmed, 
        box, 
        lastStatus: null,
        infoDiv,
        profileData: null,
        lastBoostCount: 0,
        lastSocialCount: 0
      });
    }

    function removeToken(btn) {
      const container = btn.parentElement;
      const box = container.querySelector(".box");
      const infoDiv = container.querySelector(".token-info");
      setBoxPlaceholder(box);
      infoDiv.innerHTML = "";
      infoDiv.classList.remove('visible');
      btn.style.display = "none";
      const idx = tokens.findIndex(t => t.box === box);
      if (idx !== -1) tokens.splice(idx, 1);
      box.style.borderColor = "#444";
      box.style.boxShadow = "none";
    }

    async function checkDexStatus(token) {
      try {
        const res = await fetch(`https://api.dexscreener.com/orders/v1/solana/${token.address}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        console.log("Dex API response for", token.address, ":", data);

        if (data.orders && data.orders.length > 0) {
          const status = data.orders[0].status;
          console.log("Status:", status);

          if (status !== token.lastStatus) {
            if (status === "processing") playProcessingSound();
            else if (status === "approved") playApprovedSound();
            else if (status === "cancelled") playCancelledSound();
          }
          token.lastStatus = status;

          if (status === "processing") {
            token.box.style.borderColor = "yellow";
            token.box.style.boxShadow = "0 0 20px yellow";
            setDexBanner(token, null);
          } else if (status === "approved") {
            token.box.style.borderColor = "limegreen";
            token.box.style.boxShadow = "0 0 20px limegreen";
            
            const profile = await getDex(token.address);
            
            const currentBoostCount = profile.activeBoosts;
            const currentSocialCount = profile.socials.length + profile.websites.length;
            
            if (token.lastBoostCount > 0 && currentBoostCount > token.lastBoostCount) {
              console.log(`Boost increased: ${token.lastBoostCount} -> ${currentBoostCount}`);
              playBoostUpdateSound();
            }
            
            if (token.lastSocialCount > 0 && currentSocialCount > token.lastSocialCount) {
              console.log(`Socials/websites updated: ${token.lastSocialCount} -> ${currentSocialCount}`);
              playSocialUpdateSound();
            }
            
            token.lastBoostCount = currentBoostCount;
            token.lastSocialCount = currentSocialCount;
            token.profileData = profile;
            updateTokenInfo(token);
            setDexBanner(token, profile.headerUrl);
          } else if (status === "cancelled") {
            token.box.style.borderColor = "red";
            token.box.style.boxShadow = "0 0 20px red";
            setDexBanner(token, null);
          } else {
            token.box.style.borderColor = "#444";
            token.box.style.boxShadow = "none";
            setDexBanner(token, null);
          }
        } else {
          console.log("No orders for", token.address);
          token.box.style.borderColor = "#444";
          token.box.style.boxShadow = "none";
          setDexBanner(token, null);
        }
      } catch (err) {
        console.error("Dex check failed for", token.address, ":", err);
        token.box.style.borderColor = "#444";
        token.box.style.boxShadow = "none";
        setDexBanner(token, null);
      }
    }

    let currentIndex = 0;
    setInterval(() => {
      if (tokens.length === 0) return;
      checkDexStatus(tokens[currentIndex]);
      currentIndex = (currentIndex + 1) % tokens.length;
    }, 1050);

    // --- Sound functions ---
    function playProcessingSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(440, ctx.currentTime); // lower tone
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.8);
    }

    function playApprovedSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = "triangle";
      osc1.frequency.setValueAtTime(880, ctx.currentTime);
      gain1.gain.setValueAtTime(0.3, ctx.currentTime);
      gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc1.connect(gain1).connect(ctx.destination);
      osc1.start();
      osc1.stop(ctx.currentTime + 0.4);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(660, ctx.currentTime + 0.45);
      gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.45);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.85);
      osc2.connect(gain2).connect(ctx.destination);
      osc2.start(ctx.currentTime + 0.45);
      osc2.stop(ctx.currentTime + 0.85);
    }

    function playCancelledSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(120, ctx.currentTime); // lower tone
      gain.gain.setValueAtTime(0.1, ctx.currentTime); // softer volume
      gain.gain.setValueAtTime(0.0, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.1, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.0, ctx.currentTime + 0.6);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.7);
    }

    function playSocialUpdateSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = "sine";
      osc1.frequency.setValueAtTime(523, ctx.currentTime);
      gain1.gain.setValueAtTime(0.2, ctx.currentTime);
      gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc1.connect(gain1).connect(ctx.destination);
      osc1.start();
      osc1.stop(ctx.currentTime + 0.15);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = "sine";
      osc2.frequency.setValueAtTime(523, ctx.currentTime + 0.2);
      gain2.gain.setValueAtTime(0.2, ctx.currentTime + 0.2);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc2.connect(gain2).connect(ctx.destination);
      osc2.start(ctx.currentTime + 0.2);
      osc2.stop(ctx.currentTime + 0.35);
    }

    function playBoostUpdateSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(262, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(523, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    }
  </script>
</body>
</html>
