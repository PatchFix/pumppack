<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="socket-backend-url" content="">
  <meta name="api-backend-url" content="">
  <title>Volume Monitor · PumpFun ToolKit</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <style>
    html, body { min-height: 100%; margin: 0; }
    body {
      position: relative;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }
    #backgroundCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .stars-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    .star.small { width: 2px; height: 2px; }
    .star.medium { width: 3px; height: 3px; }
    .star.large { width: 4px; height: 4px; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .vol-main {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      box-sizing: border-box;
    }
    .vol-header {
      text-align: center;
      margin-bottom: 8px;
    }
    .vol-header h1 {
      margin: 0 0 6px 0;
      font-size: 1.5rem;
    }
    .vol-sub {
      margin: 0 0 14px 0;
      font-size: 13px;
      color: #888;
      line-height: 1.45;
      max-width: 36rem;
      margin-left: auto;
      margin-right: auto;
    }
    .vol-status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .vol-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f87171;
    }
    .vol-status-dot.connected { background: #4ade80; }
    .vol-platform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .vol-platform label { color: #888; font-size: 14px; }
    .vol-platform select {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .vol-platform select:hover { border-color: #666; }
    .vol-platform select:focus { border-color: #4a9eff; }
    .vol-nav {
      text-align: center;
      margin-bottom: 18px;
    }
    .vol-nav a {
      color: #6bb3ff;
      font-size: 14px;
      text-decoration: none;
    }
    .vol-nav a:hover { text-decoration: underline; }
    .vol-panel {
      background: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      overflow: hidden;
    }
    .vol-table-head {
      display: grid;
      grid-template-columns: 36px 48px 1fr 100px;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #333;
      background: #141414;
    }
    .vol-row {
      display: grid;
      grid-template-columns: 36px 48px 1fr 100px;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .vol-row:last-child { border-bottom: none; }
    .vol-row:hover {
      background: rgba(74, 222, 128, 0.08);
    }
    .vol-rank {
      font-weight: 700;
      color: #4ade80;
      font-size: 14px;
      text-align: center;
    }
    .vol-icon-wrap {
      position: relative;
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }
    .vol-icon-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      background: #2a2a2a;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 2;
    }
    .vol-icon-img.loaded {
      opacity: 1;
    }
    .vol-icon-placeholder {
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3px;
      box-sizing: border-box;
      font-size: 9px;
      font-weight: 800;
      line-height: 1.05;
      color: #e8ffe8;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      word-break: break-word;
      overflow: hidden;
      border: 1px solid rgba(74, 222, 128, 0.35);
      background: linear-gradient(145deg, #1a2e22 0%, #0f1f18 100%);
    }
    .vol-name {
      min-width: 0;
    }
    .vol-name-line {
      font-weight: 700;
      color: #f0f0f0;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vol-symbol {
      font-size: 12px;
      color: #4ade80;
      margin-top: 2px;
    }
    .vol-amount {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #fbbf24;
      text-align: right;
    }
    .vol-empty {
      padding: 32px 16px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
    @media (max-width: 520px) {
      .vol-table-head, .vol-row {
        grid-template-columns: 28px 40px 1fr 72px;
        gap: 6px;
        padding: 8px 10px;
      }
      .vol-icon-wrap { width: 36px; height: 36px; }
      .vol-icon-placeholder { font-size: 8px; }
      .vol-amount { font-size: 11px; }
    }
  </style>
</head>
<body>
  <canvas id="backgroundCanvas"></canvas>
  <div class="stars-container" id="starsContainer" aria-hidden="true"></div>

  <div class="vol-main">
    <header class="vol-header">
      <h1>Volume Monitor</h1>
      <p class="vol-sub">Top 10 tokens by <strong>current 1-minute</strong> trading volume (buy + sell, SOL). Rankings refresh live as trades stream from the server.</p>
    </header>

    <div class="vol-status-row">
      <span class="vol-status-dot" id="volStatusDot"></span>
      <span id="volStatusText">Disconnected</span>
    </div>

    <div class="vol-platform">
      <label for="platformSelect">Trading platform:</label>
      <select id="platformSelect" aria-label="Open charts on">
        <option value="axiom">Axiom</option>
        <option value="gmgn">GMGN</option>
        <option value="terminal">Terminal</option>
      </select>
    </div>

    <div class="vol-nav">
      <a href="index.html">← Home</a>
    </div>

    <div class="vol-panel">
      <div class="vol-table-head">
        <span>#</span>
        <span></span>
        <span>Token</span>
        <span style="text-align:right">1m Vol</span>
      </div>
      <div id="volList"></div>
    </div>
  </div>

  <script>
    const LS_PLATFORM = 'scout.volume.platform.v1';
    const tokens = new Map();
    let socket = null;

    function initStars() {
      const el = document.getElementById('starsContainer');
      if (!el) return;
      const sizes = ['small', 'medium', 'large'];
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star ' + sizes[Math.floor(Math.random() * 3)];
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        el.appendChild(s);
      }
    }

    class HomeCanvasAnimation {
      constructor() {
        this.canvas = document.getElementById('backgroundCanvas');
        if (!this.canvas) return;
        this.ctx = this.canvas.getContext('2d');
        this.bars = [];
        this.setupCanvas();
        this.createBars();
        this.animate();
      }
      setupCanvas() {
        const resize = () => {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
          this.createBars();
        };
        resize();
        window.addEventListener('resize', resize);
      }
      createBars() {
        const width = this.canvas.width;
        const height = this.canvas.height;
        const barCount = Math.floor(width / 20);
        this.bars = [];
        for (let i = 0; i < barCount; i++) {
          this.bars.push({
            x: i * (width / barCount),
            height: Math.random() * height * 0.25,
            targetHeight: Math.random() * height * 0.25,
            speed: 0.005 + Math.random() * 0.01,
            phase: Math.random() * Math.PI * 2,
            waveSpeed: 0.15 + Math.random() * 0.15,
          });
        }
      }
      animate() {
        if (!this.canvas) return;
        const ctx = this.ctx;
        const width = this.canvas.width;
        const height = this.canvas.height;
        const time = Date.now() * 0.001;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, width, height);
        const barWidth = width / this.bars.length;
        this.bars.forEach((bar, i) => {
          bar.targetHeight =
            height * 0.1 +
            Math.sin(time * bar.waveSpeed + bar.phase) * (height * 0.15) +
            Math.sin(time * bar.waveSpeed * 0.7 + i * 0.1) * (height * 0.05);
          bar.height += (bar.targetHeight - bar.height) * bar.speed;
          const barHeight = Math.max(1, bar.height);
          const barX = bar.x;
          const barY = height - barHeight;
          const gradient = ctx.createLinearGradient(barX, barY, barX, height);
          gradient.addColorStop(0, 'rgba(74, 222, 128, 0.15)');
          gradient.addColorStop(0.5, 'rgba(74, 222, 128, 0.08)');
          gradient.addColorStop(1, 'rgba(74, 222, 128, 0.03)');
          ctx.fillStyle = gradient;
          ctx.fillRect(barX, barY, barWidth - 2, barHeight);
        });
        requestAnimationFrame(() => this.animate());
      }
    }

    function currentMinuteTs() {
      return Math.floor(Date.now() / 60000) * 60000;
    }

    function volumeOneMinute(tradesPerMinute) {
      const cm = currentMinuteTs();
      if (!Array.isArray(tradesPerMinute)) return 0;
      const e = tradesPerMinute.find((t) => t.minute === cm);
      if (!e) return 0;
      return (Number(e.buyVolume) || 0) + (Number(e.sellVolume) || 0);
    }

    function mergeTokenUpdate(prev, data) {
      const merged = { ...prev, ...data };
      if (!data.tradesPerMinute || !Array.isArray(data.tradesPerMinute)) {
        if (prev.tradesPerMinute) merged.tradesPerMinute = prev.tradesPerMinute;
      }
      return merged;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function apiOrigin() {
      const m = document.querySelector('meta[name="api-backend-url"]');
      const u = m?.getAttribute('content')?.trim();
      if (u) return u.replace(/\/$/, '');
      const s = document.querySelector('meta[name="socket-backend-url"]');
      const su = s?.getAttribute('content')?.trim();
      if (su) return su.replace(/\/$/, '');
      return window.location.origin;
    }

    function pumpCoinImageCdn(mint) {
      return mint ? 'https://images.pump.fun/coin-image/' + mint + '?variant=600x600' : '';
    }

    async function fetchPumpCoin(mint) {
      if (!mint) return null;
      const base = apiOrigin();
      const url = base + '/api/pump-coin/' + encodeURIComponent(mint);
      const res = await fetch(url);
      if (!res.ok) return null;
      return res.json();
    }

    function volPlaceholderLabel(t) {
      const sym = String(t.symbol || '').trim();
      if (sym) return sym.length > 6 ? sym.slice(0, 6) : sym;
      const n = String(t.name || '').trim();
      if (n) return n.length > 5 ? n.slice(0, 5) : n;
      return '?';
    }

    function tokenImageUrl(t) {
      if (t.image_uri) return t.image_uri;
      if (t.image) return t.image;
      if (t.mint) return pumpCoinImageCdn(t.mint);
      return '';
    }

    function wireVolRowImages(host) {
      if (!host) return;
      host.querySelectorAll('img.vol-icon-img').forEach((img) => {
        const mint = img.getAttribute('data-mint');

        img.addEventListener('load', () => {
          if (img.naturalWidth > 0) img.classList.add('loaded');
        });

        if (img.complete && img.naturalWidth > 0) {
          img.classList.add('loaded');
        }

        img.addEventListener('error', async () => {
          img.classList.remove('loaded');
          if (img.dataset.retryDone === '1') {
            img.style.display = 'none';
            return;
          }
          if (img.dataset.retryApi === '1') {
            img.dataset.retryDone = '1';
            img.style.display = 'none';
            return;
          }
          img.dataset.retryApi = '1';
          if (mint) {
            try {
              const api = await fetchPumpCoin(mint);
              const uri = api && (api.image_uri || api.image);
              if (uri && String(uri).trim()) {
                const u = uri.trim();
                if (u !== img.src) {
                  img.src = u;
                  return;
                }
              }
            } catch (_) {}
            const bust = pumpCoinImageCdn(mint);
            if (bust) {
              img.src = bust + '&_retry=' + Date.now();
              return;
            }
          }
          img.dataset.retryDone = '1';
          img.style.display = 'none';
        });
      });
    }

    function chartUrl(mint) {
      const sel = document.getElementById('platformSelect');
      const platform = sel?.value || 'axiom';
      switch (platform) {
        case 'gmgn':
          return 'https://gmgn.ai/sol/token/' + encodeURIComponent(mint);
        case 'terminal':
          return 'https://trade.padre.gg/trade/solana/' + encodeURIComponent(mint);
        case 'axiom':
        default:
          return 'https://axiom.trade/t/' + encodeURIComponent(mint) + '?chain=sol';
      }
    }

    function formatVolSol(v) {
      if (!v || v === 0) return '0';
      if (v >= 1000) return v.toLocaleString(undefined, { maximumFractionDigits: 1 });
      return v.toLocaleString(undefined, { maximumFractionDigits: 3 });
    }

    function renderList() {
      const host = document.getElementById('volList');
      if (!host) return;

      const arr = Array.from(tokens.values());
      arr.sort((a, b) => volumeOneMinute(b.tradesPerMinute) - volumeOneMinute(a.tradesPerMinute));
      const top = arr.slice(0, 10);

      if (top.length === 0) {
        host.innerHTML = '<div class="vol-empty">No tokens yet. Connect to the server and wait for the feed.</div>';
        return;
      }

      host.innerHTML = top
        .map((t, i) => {
          const vol = volumeOneMinute(t.tradesPerMinute);
          const img = tokenImageUrl(t);
          const mint = t.mint || '';
          const ph = escapeHtml(volPlaceholderLabel(t));
          const iconHtml = img
            ? '<div class="vol-icon-wrap"><img class="vol-icon-img" src="' +
              escapeHtml(img) +
              '" alt="" loading="lazy" data-mint="' +
              escapeHtml(mint) +
              '" /><div class="vol-icon-placeholder">' +
              ph +
              '</div></div>'
            : '<div class="vol-icon-wrap"><div class="vol-icon-placeholder">' + ph + '</div></div>';
          return (
            '<div class="vol-row" data-mint="' +
            escapeHtml(mint) +
            '" role="button" tabindex="0">' +
            '<span class="vol-rank">' +
            (i + 1) +
            '</span>' +
            iconHtml +
            '<div class="vol-name">' +
            '<div class="vol-name-line">' +
            escapeHtml(t.name || 'Unknown') +
            '</div>' +
            '<div class="vol-symbol">' +
            escapeHtml(t.symbol || '') +
            '</div></div>' +
            '<span class="vol-amount">' +
            formatVolSol(vol) +
            ' <span style="color:#888;font-size:11px">SOL</span></span>' +
            '</div>'
          );
        })
        .join('');

      wireVolRowImages(host);

      host.querySelectorAll('.vol-row').forEach((row) => {
        const open = () => {
          const mint = row.getAttribute('data-mint');
          if (mint) window.open(chartUrl(mint), '_blank', 'noopener,noreferrer');
        };
        row.addEventListener('click', open);
        row.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            open();
          }
        });
      });
    }

    function setConnected(ok) {
      const dot = document.getElementById('volStatusDot');
      const tx = document.getElementById('volStatusText');
      if (dot) dot.classList.toggle('connected', ok);
      if (tx) tx.textContent = ok ? 'Connected' : 'Disconnected';
    }

    function wirePlatformPersistence() {
      const sel = document.getElementById('platformSelect');
      if (!sel) return;
      try {
        const saved = localStorage.getItem(LS_PLATFORM);
        if (saved && ['axiom', 'gmgn', 'terminal'].includes(saved)) sel.value = saved;
      } catch (_) {}
      sel.addEventListener('change', () => {
        try {
          localStorage.setItem(LS_PLATFORM, sel.value);
        } catch (_) {}
        renderList();
      });
    }

    function connectSocket() {
      const meta = document.querySelector('meta[name="socket-backend-url"]');
      const backend = meta?.getAttribute('content')?.trim() || '';
      const socketUrl = backend || window.location.origin;
      socket = io(socketUrl, { transports: ['websocket', 'polling'] });

      socket.on('connect', () => setConnected(true));
      socket.on('disconnect', () => setConnected(false));
      socket.on('connect_error', () => setConnected(false));

      socket.on('tokens:all', (list) => {
        tokens.clear();
        (list || []).forEach((t) => {
          if (!t.mint) return;
          const copy = { ...t };
          if (!Array.isArray(copy.tradesPerMinute)) copy.tradesPerMinute = [];
          tokens.set(t.mint, copy);
        });
        renderList();
      });

      socket.on('token:new', (t) => {
        if (!t.mint) return;
        const copy = { ...t };
        if (!Array.isArray(copy.tradesPerMinute)) copy.tradesPerMinute = [];
        tokens.set(t.mint, copy);
        renderList();
      });

      socket.on('token:update', (data) => {
        if (!data.mint) return;
        const prev = tokens.get(data.mint) || {};
        tokens.set(data.mint, mergeTokenUpdate(prev, data));
        renderList();
      });

      socket.on('token:remove', (payload) => {
        const mint = payload && payload.mint;
        if (mint) {
          tokens.delete(mint);
          renderList();
        }
      });
    }

    function tickMinute() {
      renderList();
    }

    function init() {
      wirePlatformPersistence();
      connectSocket();
      setInterval(tickMinute, 1000);
    }

    initStars();
    new HomeCanvasAnimation();

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
